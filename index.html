<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ColorVote</title>
  <meta name="description" content="대한민국 사람들이 좋아하는 색을 투표로 모아 지역·연령대별 색 선호 트렌드를 실시간으로 보여주는 데이터 시각화 프로젝트." />

  <!--
    Google Search Console 소유권 인증 (Vite 환경 변수 사용)
    환경 변수 VITE_GOOGLE_VERIFICATION_ID 에 구글 서치콘솔 content 값을 지정해 주세요.
  -->
  <meta name="google-site-verification" content="%VITE_GOOGLE_VERIFICATION_ID%" />

  <!--
    Google Analytics 4는 환경 변수 VITE_GA_TRACKING_ID 가 설정되면
    src/lib/analytics.js 에서 스크립트를 동적으로 로딩하여 작동합니다.
  -->

  <!--
    Google AdSense — 승인 신청 시 아래 한 줄의 주석을 풀고
    ca-pub-0000000000000000 을 본인 게시자 ID로 교체하세요.
    (승인 전까지는 주석 상태로 두어도 됩니다.)
  -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0000000000000000" crossorigin="anonymous"></script> -->

  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet" />
</head>
<body>

</body>
</html>

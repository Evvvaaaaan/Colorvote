<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>ColorVote</title>
  <meta name="description" content="대한민국 사람들이 좋아하는 색을 투표로 모아 지역·연령대별 색 선호 트렌드를 실시간으로 보여주는 데이터 시각화 프로젝트." />

  <!--
    Google Search Console 소유권 인증 (HTML 태그 방식)
    Search Console > 속성 추가 > URL 접두어 > 'HTML 태그'에서 받은
    content 값으로 G_SITE_VERIFICATION_CODE 를 교체하세요.
  -->
  <meta name="google-site-verification" content="G_SITE_VERIFICATION_CODE" />

  <!--
    Google Analytics 4 — GA4 측정 ID(G-XXXXXXXXXX)로 G-XXXXXXXXXX 두 곳을 교체하세요.
    (페이지뷰는 SPA 화면 전환까지 src/lib/analytics.js 에서 전송합니다.)
  -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX', { send_page_view: false });
  </script>

  <!--
    Google AdSense — 승인 신청 시 아래 한 줄의 주석을 풀고
    ca-pub-0000000000000000 을 본인 게시자 ID로 교체하세요.
    (승인 전까지는 주석 상태로 두어도 됩니다.)
  -->
  <!-- <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-0000000000000000" crossorigin="anonymous"></script> -->

</head>
